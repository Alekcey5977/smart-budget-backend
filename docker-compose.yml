services:
  # --- Users Microservice ---
  users-db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB_NAME}
    ports:
      - "${USERS_DB_HOST_PORT:-5433}:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data

  users-service:
    build:
      context: .
      dockerfile: users_service/Dockerfile
    env_file:
      - .env
    ports:
      - "${USERS_SERVICE_HOST_PORT:-8001}:${USERS_SERVICE_PORT}"
    depends_on:
      - users-db
      - redis
    environment:
      DATABASE_URL: ${USERS_DATABASE_URL}
      SERVICE_PORT: ${USERS_SERVICE_PORT}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    restart: on-failure

  # --- Transactions Microservice ---
  transactions-db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${TRANSACTIONS_DB_USER}
      POSTGRES_PASSWORD: ${TRANSACTIONS_DB_PASSWORD}
      POSTGRES_DB: ${TRANSACTIONS_DB_NAME}
    ports:
      - "${TRANSACTIONS_DB_HOST_PORT:-5434}:5432"
    volumes:
      - transactions-db-data:/var/lib/postgresql/data

  transactions-service:
    build:
      context: .
      dockerfile: transactions_service/Dockerfile
    env_file:
      - .env
    ports:
      - "${TRANSACTIONS_SERVICE_HOST_PORT:-8002}:${TRANSACTIONS_SERVICE_PORT}"
    depends_on:
      - transactions-db
    environment:
      DATABASE_URL: ${TRANSACTIONS_DATABASE_URL}
      SERVICE_PORT: ${TRANSACTIONS_SERVICE_PORT}
    restart: on-failure

  # --- Images Microservice ---
  images-db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${IMAGES_DB_USER}
      POSTGRES_PASSWORD: ${IMAGES_DB_PASSWORD}
      POSTGRES_DB: ${IMAGES_DB_NAME}
    ports:
      - "${IMAGES_DB_HOST_PORT:-5435}:5432"
    volumes:
      - images-db-data:/var/lib/postgresql/data

  images-service:
    build:
      context: .
      dockerfile: images_service/Dockerfile
    env_file:
      - .env
    ports:
      - "${IMAGES_SERVICE_HOST_PORT:-8003}:${IMAGES_SERVICE_PORT}"
    depends_on:
      - images-db
      - redis
    environment:
      DATABASE_URL: ${IMAGES_DATABASE_URL}
      SERVICE_PORT: ${IMAGES_SERVICE_PORT}
    volumes:
      - ./testData:/testData
    restart: on-failure

  # --- Pseudo Bank Microservice ---
  pseudo-bank-db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PSEUDO_BANK_DB_USER}
      POSTGRES_PASSWORD: ${PSEUDO_BANK_DB_PASSWORD}
      POSTGRES_DB: ${PSEUDO_BANK_DB_NAME}
    ports:
      - "${PSEUDO_BANK_DB_HOST_PORT:-5436}:5432"
    volumes:
      - pseudo-bank-db-data:/var/lib/postgresql/data

  pseudo-bank-service:
    build: ./pseudo_bank_service
    env_file:
      - .env
    ports:
      - "${PSEUDO_BANK_SERVICE_HOST_PORT:-8004}:${PSEUDO_BANK_SERVICE_PORT}"
    depends_on:
      - pseudo-bank-db
    environment:
      DATABASE_URL: ${PSEUDO_BANK_DATABASE_URL}
      SERVICE_PORT: ${PSEUDO_BANK_SERVICE_PORT}
    restart: on-failure

  # --- Purposes Microservice ---
  purposes-db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PURPOSES_DB_USER}
      POSTGRES_PASSWORD: ${PURPOSES_DB_PASSWORD}
      POSTGRES_DB: ${PURPOSES_DB_NAME}
    ports:
      - "${PURPOSES_DB_HOST_PORT:-5437}:5432"
    volumes:
      - purposes-db-data:/var/lib/postgresql/data

  purposes-service:
    build:
      context: .
      dockerfile: purposes_service/Dockerfile
    env_file:
      - .env
    ports:
      - "${PURPOSES_SERVICE_HOST_PORT:-8005}:${PURPOSES_SERVICE_PORT}"
    depends_on:
      - purposes-db
      - redis
    environment:
      DATABASE_URL: ${PURPOSES_DATABASE_URL}
      SERVICE_PORT: ${PURPOSES_SERVICE_PORT}
      REDIS_URL: ${REDIS_URL}
    restart: on-failure

  # --- Notification Microservice ---
  notification-db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
    ports:
      - "${NOTIFICATION_DB_HOST_PORT:-5438}:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data

  notification-service:
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    env_file:
      - .env
    ports:
      - "${NOTIFICATION_SERVICE_HOST_PORT:-8006}:${NOTIFICATION_SERVICE_PORT}"
    depends_on:
      - notification-db
      - redis
    environment:
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    restart: on-failure

  # --- History Microservice ---
  history-db:
    image: postgres:13
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${HISTORY_DB_USER}
      POSTGRES_PASSWORD: ${HISTORY_DB_PASSWORD}
      POSTGRES_DB: ${HISTORY_DB_NAME}
    ports:
      - "${HISTORY_DB_HOST_PORT:-5439}:5432"
    volumes:
      - history-db-data:/var/lib/postgresql/data

  history-service:
    build:
      context: .
      dockerfile: history_service/Dockerfile
    env_file:
      - .env
    ports:
      - "${HISTORY_SERVICE_HOST_PORT:-8007}:${HISTORY_SERVICE_PORT}"
    depends_on:
      - history-db
      - redis
    environment:
      DATABASE_URL: ${HISTORY_DATABASE_URL}
      SERVICE_PORT: ${HISTORY_SERVICE_PORT}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    restart: on-failure

  # --- API Gateway ---
  gateway:
    build: ./gateway
    env_file:
      - .env
    ports:
      - "${GATEWAY_HOST_PORT:-8000}:${GATEWAY_PORT}"
    depends_on:
      - users-service
      - transactions-service
      - images-service
      - purposes-service
      - notification-service
      - history-service
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
      TRANSACTIONS_SERVICE_URL: ${TRANSACTIONS_SERVICE_URL}
      IMAGES_SERVICE_URL: ${IMAGES_SERVICE_URL}
      PSEUDO_BANK_SERVICE_URL: ${PSEUDO_BANK_SERVICE_URL}
      PURPOSES_SERVICE_URL: ${PURPOSES_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      HISTORY_SERVICE_URL: ${HISTORY_SERVICE_URL}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
    restart: on-failure


# --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  users-db-data:
  transactions-db-data:
  images-db-data:
  pseudo-bank-db-data:
  purposes-db-data:
  notification-db-data:
  history-db-data:
  redis_data:
